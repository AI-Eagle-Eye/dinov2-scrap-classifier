experiment:
  name: exp_q_partial_vpt
  description: "Exp Q: DINOv2-B + Partial VPT (layers 8-11 only) + Attention head + FocalLoss"

model:
  backbone_name: dinov2_vitb14
  head_type: attention
  vpt:
    enabled: true
    num_tokens: 10
    insert_from_layer: 8  # blocks 0-7 frozen, prompts injected at blocks 8-11
  dropout: 0.1
  num_classes: 3
  use_grad_checkpoint: true

data:
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 0.0
  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 10
  label_smoothing: 0.1
  loss_type: focal
  focal_gamma: 2.0
  seed: 42

data_augmentation:
  use_weighted_sampler: false
