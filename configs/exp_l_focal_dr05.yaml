experiment:
  name: exp_l_focal_dr05
  description: "Exp L: Focal + DangerRecall (lambda_dr=0.5)"

model:
  backbone_name: dinov2_vitb14
  head_type: attention
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.1
  num_classes: 3
  use_grad_checkpoint: true

data:
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 1.0e-5
  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 10
  label_smoothing: 0.1
  focal_gamma: 2.0
  seed: 42
  loss_type: focal_dr
  use_learnable_weight: false
  lambda_dr: 0.5

data_augmentation:
  use_weighted_sampler: false
