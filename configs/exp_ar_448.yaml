experiment:
  name: exp_ar_448
  description: "Exp AR: exp_ap base at 448 res, patience 18, no grad checkpoint, stronger aug"

model:
  backbone_name: dinov2_vitb14
  head_type: attention
  head_use_cls: true
  backbone:
    frozen: true
    unfreeze_last_n: 4
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.2
  num_classes: 3
  use_grad_checkpoint: false
  use_learnable_weight: false

data:
  csv_path: dataset/label_with_split_full.csv
  label_col: v2_label
  split_col: split_v2
  image_size: 448
  batch_size: 32
  num_workers: 4
  unk_label: excluded
  padding_color: mean
  padding_variants:
    - crops_0pct
    - crops_10pct
    - crops_25pct

training:
  epochs: 50
  optimizer: adamw
  backbone_lr: 1.0e-5
  head_lr: 1.0e-3
  llrd_decay: 0.75
  weight_decay: 1.0e-1
  warmup_ratio: 0.1
  warmup_type: linear
  early_stopping_patience: 18
  best_metric: f1_macro
  best_mode: max
  das_constraint: 0.15
  label_smoothing: 0.2
  focal_gamma: 2.0
  seed: 42
  use_learnable_weight: false
  use_ema: true

data_augmentation:
  use_weighted_sampler: false
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.1
    hue: 0.0
  random_grayscale_p: 0.1
  randaugment:
    enabled: true
    num_ops: 2
    magnitude: 6
  random_erasing:
    enabled: true
    p: 0.25
