experiment:
  name: exp_p_class_aware
  description: "Exp P: DINOv2-B + ClassAwareHead (inverse-freq init) + FocalLoss"

model:
  backbone_name: dinov2_vitb14
  head_type: class_aware
  class_aware_init_weights:
    - 0.000103  # 1/9713  (cut)
    - 0.000185  # 1/5393  (danger)
    - 0.000358  # 1/2797  (excluded)
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.1
  num_classes: 3
  use_grad_checkpoint: true

data:
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 1.0e-5
  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 10
  label_smoothing: 0.1
  loss_type: focal
  focal_gamma: 2.0
  seed: 42

data_augmentation:
  use_weighted_sampler: false
