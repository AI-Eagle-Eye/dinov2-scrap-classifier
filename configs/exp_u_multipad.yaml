experiment:
  name: exp_u_multipad
  description: "Exp U: multi-padding augmentation (0pct + 10pct + 25pct crop concat)"

model:
  backbone_name: dinov2_vitb14
  head_type: attention
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.1
  num_classes: 3
  use_grad_checkpoint: true
  use_learnable_weight: false

data:
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded
  padding_variants:
    - crops_0pct
    - crops_10pct
    - crops_25pct

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 1.0e-5
  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 6
  best_metric: val_loss
  best_mode: min
  das_constraint: 0.15
  label_smoothing: 0.1
  focal_gamma: 2.0
  seed: 42
  use_learnable_weight: false

data_augmentation:
  use_weighted_sampler: false
