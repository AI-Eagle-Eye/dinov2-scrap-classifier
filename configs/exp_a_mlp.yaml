experiment:
  name: exp_a_mlp
  description: "Exp A: DINOv2-B frozen + MLP head (baseline)"

model:
  backbone_name: dinov2_vitb14
  head_type: mlp
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.3
  num_classes: 3
  use_grad_checkpoint: true

data:
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 0.0
  lr: 1.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 10
  label_smoothing: 0.1
  focal_gamma: 2.0
  seed: 42

data_augmentation:
  use_weighted_sampler: false
