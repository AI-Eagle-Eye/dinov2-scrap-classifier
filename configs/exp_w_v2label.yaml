experiment:
  name: exp_w_v2label
  description: "Exp W: v2_label + split_v2 컬럼 사용 (재검수 라벨 적용, exp_t 기반)"

model:
  backbone_name: dinov2_vitb14
  head_type: attention
  vpt:
    enabled: false
    num_tokens: 10
  dropout: 0.1
  num_classes: 3
  use_grad_checkpoint: true
  use_learnable_weight: false

data:
  csv_path: dataset/label_with_split_full.csv
  label_col: v2_label
  split_col: split_v2
  image_size: 336
  batch_size: 32
  num_workers: 4
  unk_label: excluded

training:
  epochs: 50
  optimizer: lion
  backbone_lr: 1.0e-5
  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_ratio: 0.1
  early_stopping_patience: 6
  best_metric: val_loss
  best_mode: min
  das_constraint: 0.15
  label_smoothing: 0.1
  focal_gamma: 2.0
  seed: 42
  use_learnable_weight: false

data_augmentation:
  use_weighted_sampler: false
